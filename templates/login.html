<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Career Navigator</title>
    <meta name="description" content="Login to AI Career Navigator to save your assessments.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            max-width: 450px;
            margin: 2rem auto;
        }
        
        .login-form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .login-form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .login-form-group input {
            width: 100%;
        }
        
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        
        .login-options a {
            color: var(--accent-primary);
            text-decoration: none;
        }
        
        .login-options a:hover {
            text-decoration: underline;
        }
        
        .signup-prompt {
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        
        .signup-prompt a {
            color: var(--text-primary);
            font-weight: 600;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <nav>
        <a href="/" class="logo">CareerAI.</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/recommend">Assessment</a>
        </div>
    </nav>

    <main class="container">
        <div class="form-container login-container" style="text-align: center;">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p style="color: var(--text-secondary);">Log in to view your career assessments</p>
            </div>

            <form action="/login" method="POST">
                <div class="login-form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>

                <div class="login-form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="login-options">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" name="remember" style="accent-color: var(--accent-primary);">
                        <span style="color: var(--text-secondary);">Remember me</span>
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                
                <div class="signup-prompt">
                    Don't have an account? <a href="#">Create an account</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
