<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment - AI Career Navigator</title>
    <meta name="description" content="Take the assessment to find your ideal career.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <nav>
        <a href="/" class="logo">CareerAI.</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/recommend">Assessment</a>
        </div>
    </nav>

    <main class="container">
        <div class="form-container">
            <div class="form-header">
                <h2>Your Profile</h2>
                <p style="color: var(--text-secondary);">Tell us about your academic and personal background</p>
            </div>

            <form action="/pred" method="POST" id="predictionForm">
                <div class="form-grid">
                    <!-- Personal Info -->
                    <div class="section-title">Background & Lifestyle</div>
                    
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="gender" class="form-control" required>
                            <option value="" disabled selected>Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="part_time_job">Part-Time Job</label>
                        <select id="part_time_job" name="part_time_job" class="form-control" required>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="extracurricular_activities">Extracurricular Activities</label>
                        <select id="extracurricular_activities" name="extracurricular_activities" class="form-control" required>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="absence_days">Absence Days</label>
                        <input type="number" id="absence_days" name="absence_days" class="form-control" min="0" max="365" placeholder="e.g. 2" required>
                    </div>

                    <div class="form-group">
                        <label for="weekly_self_study_hours">Weekly Self-Study (Hours)</label>
                        <input type="number" id="weekly_self_study_hours" name="weekly_self_study_hours" class="form-control" min="0" max="168" placeholder="e.g. 10" required>
                    </div>

                    <!-- Academic Scores -->
                    <div class="section-title">Academic Scores (0-100)</div>
                    
                    <div class="form-group">
                        <label for="math_score">Math</label>
                        <input type="number" id="math_score" name="math_score" class="form-control score-input" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <div class="form-group">
                        <label for="physics_score">Physics</label>
                        <input type="number" id="physics_score" name="physics_score" class="form-control score-input" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <div class="form-group">
                        <label for="chemistry_score">Chemistry</label>
                        <input type="number" id="chemistry_score" name="chemistry_score" class="form-control score-input" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <div class="form-group">
                        <label for="biology_score">Biology</label>
                        <input type="number" id="biology_score" name="biology_score" class="form-control score-input" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <div class="form-group">
                        <label for="english_score">English</label>
                        <input type="number" id="english_score" name="english_score" class="form-control score-input" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <div class="form-group">
                        <label for="history_score">History</label>
                        <input type="number" id="history_score" name="history_score" class="form-control score-input" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <div class="form-group">
                        <label for="geography_score">Geography</label>
                        <input type="number" id="geography_score" name="geography_score" class="form-control score-input" min="0" max="100" placeholder="0-100" required>
                    </div>

                    <!-- Hidden calculated fields -->
                    <input type="hidden" id="total_score" name="total_score" value="0">
                    <input type="hidden" id="average_score" name="average_score" value="0">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">Generate Predictions</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        // Auto-calculate total and average scores
        const form = document.getElementById('predictionForm');
        const scoreInputs = document.querySelectorAll('.score-input');
        const totalScoreInput = document.getElementById('total_score');
        const avgScoreInput = document.getElementById('average_score');

        form.addEventListener('submit', function(e) {
            let total = 0;
            let count = 0;

            scoreInputs.forEach(input => {
                const val = parseFloat(input.value);
                if (!isNaN(val)) {
                    total += val;
                    count++;
                }
            });

            if (count > 0) {
                totalScoreInput.value = total;
                avgScoreInput.value = (total / count).toFixed(2);
            }
            
            // Add loading state
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = 'Analyzing Profile...';
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
